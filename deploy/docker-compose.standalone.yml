# Standalone / Self-Hosted deployment
# All features enabled, no Stripe/subscriptions required
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mbt
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mbt_standalone_2026}
      POSTGRES_DB: mbt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbt"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - MBT_MODE=standalone
      - DATABASE_URL=postgresql://mbt:${DB_PASSWORD:-mbt_standalone_2026}@db:5432/mbt
      - JWT_SECRET=${JWT_SECRET:-mbt_jwt_standalone_2026}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3000}
      - ADMIN_SECRET=${ADMIN_SECRET:-mbt_admin_standalone_2026}
      # Stripe not needed in standalone mode
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
